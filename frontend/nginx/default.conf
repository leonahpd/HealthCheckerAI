server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Serve React SPA
    location / {
        try_files $uri /index.html;
    }

    # Serve static assets normally
    location /static/ {
        root /usr/share/nginx/html;
    }

    # Optional: handle favicon
    location = /favicon.ico {
        root /usr/share/nginx/html;
    }

    # Optional: error page
    error_page 404 /index.html;
}
