<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <!-- 📱 Mobile Responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- 🎨 Theme -->
  <meta name="theme-color" content="#0d6efd" />

  <!-- 🧠 SEO -->
  <meta
    name="description"
    content="AI-powered healthcare symptom checker for real-time disease prediction and recommendations."
  />
  <meta name="keywords" content="AI health, symptom checker, medical AI, healthcare app" />
  <meta name="author" content="HealthCheckerAI" />

  <!-- 🔗 Favicon -->
  <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />

  <!-- 🚀 Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <title>HealthChecker AI 🩺</title>

  <!-- 🔥 Loader Styles -->
  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background-color: #f5f7fa;
    }

    #root {
      height: 100vh;
    }

    .loader-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
      color: #333;
    }

    .spinner {
      width: 45px;
      height: 45px;
      border: 4px solid #ddd;
      border-top: 4px solid #0d6efd;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 12px;
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }

    .app-title {
      font-size: 22px;
      font-weight: 600;
      color: #0d6efd;
    }

    .tagline {
      font-size: 14px;
      color: #666;
    }
  </style>
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>

  <!-- ⚡ Loader before React mounts -->
  <div id="root">
    <div class="loader-container">
      <div class="spinner"></div>
      <div class="app-title">HealthChecker AI 🩺</div>
      <div class="tagline">Analyzing symptoms intelligently...</div>
    </div>
  </div>

</body>
</html>
